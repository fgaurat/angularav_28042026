<table class="table">
  <tbody>
    @for(todo of todos();track todo.id) {
    <tr>
      <td>{{ todo.id }}</td>
      <td>{{ todo.title }}</td>
      <td>{{ todo.completed }}</td>
      <td>
        <input type="checkbox" [(ngModel)]="todo.completed" />
      </td>
      <td>
          <button class="btn btn-danger" (click)="deleteTodo(todo)">Delete</button>
      </td>
    </tr>
    }

  </tbody>
</table>
